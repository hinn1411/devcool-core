# Common
spring.application.name=devcool

# JPA (common defaults)
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

# Docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AWS (common; override per env if needed)
aws.region=ap-southeast-1

# Security (common: secrets come from env in all envs)
security.jwt.access-secret=${JWT_ACCESS_SECRET}
security.jwt.refresh-secret=${JWT_REFRESH_SECRET}
